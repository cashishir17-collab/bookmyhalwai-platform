<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">BookMyHalwai BMH emblem</title>
  <desc id="desc">Minimal circular luxury emblem with BMH initials and a subtle chef cloche line.</desc>
  <defs>
    <linearGradient id="ring" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#D7BA7D"/>
      <stop offset="100%" stop-color="#B4904E"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#10233E"/>
      <stop offset="100%" stop-color="#0A162B"/>
    </linearGradient>
  </defs>

  <circle cx="128" cy="128" r="120" fill="#FCF8EE" stroke="url(#ring)" stroke-width="8"/>
  <circle cx="128" cy="128" r="102" fill="url(#core)"/>
  <circle cx="128" cy="128" r="84" fill="none" stroke="#0F6456" stroke-width="2.5" opacity="0.5"/>

  <g transform="translate(128 83)">
    <path d="M-32 8h64c0-17-14-30-32-30S-32-9-32 8Z" fill="none" stroke="url(#ring)" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-35 12h70c0 5-4 8-8 8h-54c-4 0-8-3-8-8Z" fill="#D7BA7D"/>
    <circle cx="0" cy="-24" r="4" fill="#0F6456"/>
  </g>

  <text x="128" y="150" fill="#F7F1E4" font-family="Cinzel, serif" font-size="52" font-weight="700" letter-spacing="3" text-anchor="middle">BMH</text>
</svg>
